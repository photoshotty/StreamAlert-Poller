name: kick-poll

# Calls Kick's official api.kick.com/public/v1/channels endpoint (OAuth
# client_credentials flow) from rotating GitHub Actions runner IPs and
# POSTs the results to a Vercel ingest endpoint on the StreamAlert
# deployment.
#
# Cloudflare WAF blocks unauthenticated access to Kick's /api/v2 and the
# HTML route from datacenter IPs (HTTP 403 with ref:9e4db7e3), so the
# official OAuth API is the only viable path here.
#
# Triggered externally via the workflow_dispatch REST API (cron-job.org
# hits the dispatch URL every ~5 minutes).
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   KICK_INGEST_URL    - full URL of the Vercel ingest endpoint
#                        (e.g. https://your-app.vercel.app/api/cron/kick-ingest)
#   INGEST_SECRET      - must match the CRON_SECRET set on Vercel
#   KICK_CLIENT_ID     - OAuth client ID from kick.com/settings/developer
#   KICK_CLIENT_SECRET - OAuth client secret from same

on:
  workflow_dispatch:

concurrency:
  group: kick-poll
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run scrape
        env:
          INGEST_URL: ${{ secrets.KICK_INGEST_URL }}
          INGEST_SECRET: ${{ secrets.INGEST_SECRET }}
          KICK_CLIENT_ID: ${{ secrets.KICK_CLIENT_ID }}
          KICK_CLIENT_SECRET: ${{ secrets.KICK_CLIENT_SECRET }}
        run: node scripts/kick-poll.mjs
